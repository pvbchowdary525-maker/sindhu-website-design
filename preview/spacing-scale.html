<!doctype html>
<html lang="en" class="sindhu">
<head>
<meta charset="utf-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { padding: 20px 24px; background: var(--cream); color: var(--espresso); font-family: var(--font-body); }
  .row { display: flex; flex-direction: column; gap: 8px; }
  .step { display: flex; align-items: center; gap: 16px; }
  .meta { width: 140px; flex: none; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-soft); }
  .bar { background: var(--saffron); height: 14px; border-radius: 4px; }
  .px { width: 50px; font-size: 12px; color: var(--fg-soft); text-align: right; }
</style>
</head>
<body>
  <div class="row">
    <div class="step"><div class="meta">--sp-1</div><div class="bar" style="width: 4px"></div><div class="px">4 px</div></div>
    <div class="step"><div class="meta">--sp-2</div><div class="bar" style="width: 8px"></div><div class="px">8 px</div></div>
    <div class="step"><div class="meta">--sp-3</div><div class="bar" style="width: 12px"></div><div class="px">12 px</div></div>
    <div class="step"><div class="meta">--sp-4</div><div class="bar" style="width: 16px"></div><div class="px">16 px</div></div>
    <div class="step"><div class="meta">--sp-5</div><div class="bar" style="width: 24px"></div><div class="px">24 px</div></div>
    <div class="step"><div class="meta">--sp-6</div><div class="bar" style="width: 32px"></div><div class="px">32 px</div></div>
    <div class="step"><div class="meta">--sp-7</div><div class="bar" style="width: 48px"></div><div class="px">48 px</div></div>
    <div class="step"><div class="meta">--sp-8</div><div class="bar" style="width: 64px"></div><div class="px">64 px</div></div>
    <div class="step"><div class="meta">--sp-9</div><div class="bar" style="width: 96px"></div><div class="px">96 px</div></div>
    <div class="step"><div class="meta">--sp-10</div><div class="bar" style="width: 128px"></div><div class="px">128 px</div></div>
  </div>
</body>
</html>
