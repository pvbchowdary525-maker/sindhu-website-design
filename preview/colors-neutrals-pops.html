<!doctype html>
<html lang="en" class="sindhu">
<head>
<meta charset="utf-8">
<title>Palette · Neutrals & Pops</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { padding: 20px 24px; background: var(--cream); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .chip { border-radius: 14px; padding: 14px 16px; min-height: 110px; display: flex; flex-direction: column; justify-content: space-between; }
  .chip .name { font-family: var(--font-display); font-weight: 800; font-size: 20px; letter-spacing: -0.01em; }
  .chip .hex  { font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.85; }
  .chip .role { font-size: 12px; opacity: 0.85; line-height: 1.35; }
  .on-dark { color: var(--cream); }
  .on-light { color: var(--espresso); }
  .ring { border: 1.5px solid var(--espresso); }
</style>
</head>
<body>
  <div class="row">
    <div class="chip on-light ring" style="background: var(--cream)">
      <div>
        <div class="name">Cream</div>
        <div class="role">Default page background</div>
      </div>
      <div class="hex">#F8F1E4</div>
    </div>
    <div class="chip on-light ring" style="background: var(--cream-warm)">
      <div>
        <div class="name">Cream warm</div>
        <div class="role">Card tint · second-tier surface</div>
      </div>
      <div class="hex">#EFE4CE</div>
    </div>
    <div class="chip on-dark" style="background: var(--mint)">
      <div>
        <div class="name">Mint</div>
        <div class="role">Fresh / veg signal · small accents</div>
      </div>
      <div class="hex">#7BA05B</div>
    </div>
    <div class="chip on-dark" style="background: var(--magenta)">
      <div>
        <div class="name">Magenta</div>
        <div class="role">Stickers · surprise pop · sparingly</div>
      </div>
      <div class="hex">#D63384</div>
    </div>
  </div>
</body>
</html>
