<!doctype html>
<html lang="en" class="sindhu">
<head>
<meta charset="utf-8">
<title>Type · Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { padding: 20px 24px; background: var(--cream); color: var(--espresso); font-family: var(--font-body); }
  table { width: 100%; border-collapse: collapse; }
  td { padding: 6px 0; border-bottom: 1px solid var(--espresso-12); vertical-align: middle; }
  td.token { font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-soft); width: 32%; }
  td.value { font-size: 12px; letter-spacing: 0.06em; color: var(--fg-soft); width: 22%; }
  td.demo { font-family: var(--font-display); font-weight: 700; color: var(--espresso); line-height: 1; }
  tr:last-child td { border: none; }
</style>
</head>
<body>
  <table>
    <tr><td class="token">--fs-display-xl</td><td class="value">160 / 64–160</td><td class="demo" style="font-size: 44px;">Aa Bb</td></tr>
    <tr><td class="token">--fs-display-lg</td><td class="value">104 / 48–104</td><td class="demo" style="font-size: 36px;">Aa Bb</td></tr>
    <tr><td class="token">--fs-display-md</td><td class="value">64 / 36–64</td><td class="demo" style="font-size: 30px;">Aa Bb</td></tr>
    <tr><td class="token">--fs-h2</td><td class="value">44 / 28–44</td><td class="demo" style="font-size: 26px;">Aa Bb</td></tr>
    <tr><td class="token">--fs-h3</td><td class="value">28 / 22–28</td><td class="demo" style="font-size: 22px;">Aa Bb</td></tr>
    <tr><td class="token">--fs-body</td><td class="value">17</td><td class="demo" style="font-family: var(--font-body); font-weight: 500; font-size: 17px;">Aa Bb · the quick brown fox</td></tr>
    <tr><td class="token">--fs-caption</td><td class="value">13 · caps</td><td class="demo" style="font-family: var(--font-body); font-weight: 500; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase;">Aa Bb · caption</td></tr>
  </table>
</body>
</html>
