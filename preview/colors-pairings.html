<!doctype html>
<html lang="en" class="sindhu">
<head>
<meta charset="utf-8">
<title>Color · Pairings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { padding: 20px 24px; background: var(--cream); font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .pair { border-radius: 14px; overflow: hidden; display: flex; min-height: 120px; }
  .pair > div { flex: 1; padding: 14px 16px; display: flex; flex-direction: column; justify-content: space-between; }
  .lbl { font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.85; }
  .demo { font-family: var(--font-display); font-weight: 800; font-size: 22px; letter-spacing: -0.01em; line-height: 1; }
  .cta { display: inline-flex; align-self: flex-start; padding: 8px 14px; border-radius: 999px; font-family: var(--font-body); font-weight: 600; font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="grid">
    <!-- 1. Editorial default -->
    <div class="pair">
      <div style="background: var(--cream); color: var(--espresso);">
        <div class="lbl">Editorial default</div>
        <div class="demo">cream + espresso text</div>
        <span class="cta" style="background: var(--saffron); color: var(--espresso);">Order Now</span>
      </div>
    </div>
    <!-- 2. Hero -->
    <div class="pair">
      <div style="background: var(--saffron); color: var(--espresso);">
        <div class="lbl">Hero band</div>
        <div class="demo">SAFFRON + ESPRESSO</div>
        <span class="cta" style="background: var(--brick); color: var(--cream);">View Menu</span>
      </div>
    </div>
    <!-- 3. Marquee -->
    <div class="pair">
      <div style="background: var(--brick); color: var(--cream);">
        <div class="lbl">Marquee strip</div>
        <div class="demo">FRESH DUM • SOUL SERVED</div>
        <span class="cta" style="background: var(--cream); color: var(--brick);">Chala bagundi</span>
      </div>
    </div>
    <!-- 4. Cream-warm card -->
    <div class="pair">
      <div style="background: var(--cream-warm); color: var(--espresso); box-shadow: inset 0 0 0 1.5px var(--espresso-12);">
        <div class="lbl">Card on cream</div>
        <div class="demo" style="color: var(--brick)">Mana Biryani</div>
        <span class="cta" style="background: var(--saffron); color: var(--espresso);">Hostel fav</span>
      </div>
    </div>
  </div>
</body>
</html>
