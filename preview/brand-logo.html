<!doctype html>
<html lang="en" class="sindhu">
<head>
<meta charset="utf-8">
<title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--cream); padding: 28px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .tile { border-radius: 14px; padding: 22px; display: flex; flex-direction: column; align-items: center; gap: 10px; min-height: 140px; justify-content: center; }
  .light { background: var(--cream); border: 1.5px solid var(--espresso); }
  .saffron { background: var(--saffron); }
  .dark { background: var(--espresso); }
  .lbl { font-family: var(--font-body); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.7; }
  .logo { width: 200px; height: 70px; }
  .logo.invert { filter: invert(1); }
  .logo.cream-text { filter: invert(95%) sepia(11%) saturate(388%) hue-rotate(348deg) brightness(102%) contrast(94%); }
</style>
</head>
<body>
  <div class="tile light">
    <img class="logo" src="../assets/logo.svg" alt="">
    <div class="lbl" style="color: var(--fg-soft);">on cream · primary</div>
  </div>
  <div class="tile saffron">
    <img class="logo" src="../assets/logo.svg" alt="">
    <div class="lbl" style="color: var(--espresso);">on saffron · espresso ink</div>
  </div>
  <div class="tile dark">
    <img class="logo cream-text" src="../assets/logo.svg" alt="">
    <div class="lbl" style="color: var(--cream);">on espresso · knockout</div>
  </div>
  <div class="tile" style="background: var(--brick);">
    <img class="logo cream-text" src="../assets/logo.svg" alt="">
    <div class="lbl" style="color: var(--cream);">on brick · knockout</div>
  </div>
</body>
</html>
