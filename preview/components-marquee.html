<!doctype html>
<html lang="en" class="sindhu">
<head>
<meta charset="utf-8">
<title>Marquee strip</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--cream); padding: 28px 0; overflow: hidden; }
  .marquee { background: var(--brick); color: var(--cream); padding: 22px 0; overflow: hidden; white-space: nowrap; position: relative; }
  .track { display: inline-flex; gap: 36px; padding-left: 0; animation: scroll 28s linear infinite; align-items: center; }
  .track span { font-family: var(--font-display); font-weight: 800; font-size: 44px; line-height: 1; text-transform: uppercase; letter-spacing: -0.005em; }
  .track .dot { width: 14px; height: 14px; border-radius: 50%; background: var(--saffron); display: inline-block; }
  @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
</style>
</head>
<body>
  <div class="marquee">
    <div class="track">
      <span>FRESH DUM</span><span class="dot"></span>
      <span>SLOW COOKED</span><span class="dot"></span>
      <span>SOUL SERVED</span><span class="dot"></span>
      <span>CHALA BAGUNDI</span><span class="dot"></span>
      <span>FRESH DUM</span><span class="dot"></span>
      <span>SLOW COOKED</span><span class="dot"></span>
      <span>SOUL SERVED</span><span class="dot"></span>
      <span>CHALA BAGUNDI</span><span class="dot"></span>
    </div>
  </div>
</body>
</html>
