<!doctype html>
<html lang="en" class="sindhu">
<head>
<meta charset="utf-8">
<title>Menu Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { padding: 22px 24px; background: var(--cream); color: var(--espresso); font-family: var(--font-body); }
  .card { background: var(--cream-warm); border-radius: var(--radius-md); padding: 20px 24px; display: grid; grid-template-columns: 120px 1fr auto; gap: 20px; align-items: center; box-shadow: var(--shadow-soft); position: relative; max-width: 640px; }
  .photo { width: 120px; height: 120px; background: var(--saffron); border-radius: var(--radius-blob); display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .photo img { width: 100%; height: 100%; object-fit: cover; }
  .name { font-family: var(--font-display); font-weight: 800; text-transform: uppercase; font-size: 26px; letter-spacing: 0.005em; line-height: 1; margin-bottom: 6px; }
  .desc { font-size: 15px; line-height: 1.45; color: var(--fg-soft); max-width: 280px; }
  .price { font-family: var(--font-display); font-weight: 800; font-size: 38px; line-height: 1; color: var(--brick); }
  .rupee { font-size: 22px; vertical-align: super; margin-right: 2px; }
  .badge { position: absolute; top: -10px; right: -10px; background: var(--magenta); color: var(--cream); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 6px 10px; border-radius: 999px; transform: rotate(8deg); box-shadow: var(--shadow-sticker); font-weight: 700; }
</style>
</head>
<body>
  <div class="card">
    <div class="badge">Hostel fav</div>
    <div class="photo"><img src="../assets/biryani-placeholder.svg" alt=""></div>
    <div>
      <div class="name">Dum Biryani</div>
      <div class="desc">Slow-cooked over coals, sealed with dough. The classic that started it all.</div>
    </div>
    <div class="price"><span class="rupee">₹</span>170</div>
  </div>
</body>
</html>
