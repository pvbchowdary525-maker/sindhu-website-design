<!doctype html>
<html lang="en" class="sindhu">
<head>
<meta charset="utf-8">
<title>Type · Script & Telugu</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { padding: 20px 24px; background: var(--cream); color: var(--espresso); }
  .row { display: flex; flex-direction: column; gap: 14px; }
  .specimen { display: flex; align-items: baseline; gap: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--espresso-12); }
  .specimen:last-child { border: none; }
  .meta { width: 140px; flex: none; font-family: var(--font-body); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-soft); line-height: 1.5; }
  .script { font-family: var(--font-script); font-weight: 500; color: var(--brick); line-height: 1; }
  .telugu { font-family: var(--font-telugu); color: var(--espresso); line-height: 1.1; }
  .product { font-family: var(--font-display); font-weight: 800; text-transform: uppercase; letter-spacing: 0.01em; line-height: 1; }
</style>
</head>
<body>
  <div class="row">
    <div class="specimen">
      <div class="meta">Script · Caveat 500<br>Handwritten notes</div>
      <div class="script" style="font-size: 30px;">a poc a poc... slowly, slowly.</div>
    </div>
    <div class="specimen">
      <div class="meta">Telugu · Noto 700<br>Section labels & logo</div>
      <div class="telugu" style="font-size: 38px;">సింధు — మన బిర్యానీ</div>
    </div>
    <div class="specimen">
      <div class="meta">Product name<br>Display 800 caps</div>
      <div class="product" style="font-size: 36px;">DUM BIRYANI · ₹170</div>
    </div>
  </div>
</body>
</html>
