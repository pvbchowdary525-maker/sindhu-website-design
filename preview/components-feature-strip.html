<!doctype html>
<html lang="en" class="sindhu">
<head>
<meta charset="utf-8">
<title>Feature icon strip</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { padding: 24px; background: var(--cream); color: var(--espresso); font-family: var(--font-body); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .feat { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px; padding: 10px 6px; }
  .feat .ic { width: 56px; height: 56px; color: var(--espresso); }
  .feat .lbl { font-family: var(--font-display); font-weight: 700; font-size: 16px; line-height: 1.2; }
  .feat .desc { font-size: 12px; color: var(--fg-soft); line-height: 1.4; }
</style>
</head>
<body>
  <div class="row">
    <div class="feat">
      <img class="ic" src="../assets/icons/wheat.svg" alt="">
      <div class="lbl">Aged basmati</div>
      <div class="desc">long-grain, perfumed rice</div>
    </div>
    <div class="feat">
      <img class="ic" src="../assets/icons/flame.svg" alt="">
      <div class="lbl">Slow-cooked dum</div>
      <div class="desc">over coals, sealed with dough</div>
    </div>
    <div class="feat">
      <img class="ic" src="../assets/icons/scooter.svg" alt="">
      <div class="lbl">30-min to VIT-AP</div>
      <div class="desc">hot to the hostel door</div>
    </div>
    <div class="feat">
      <img class="ic" src="../assets/icons/rupee.svg" alt="">
      <div class="lbl">Hostel pricing</div>
      <div class="desc">student-friendly, always</div>
    </div>
  </div>
</body>
</html>
