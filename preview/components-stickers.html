<!doctype html>
<html lang="en" class="sindhu">
<head>
<meta charset="utf-8">
<title>Stickers & badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { padding: 28px 24px; background: var(--cream); display: flex; gap: 28px; align-items: center; justify-content: center; flex-wrap: wrap; }
  .sticker { width: 130px; height: 130px; filter: drop-shadow(0 6px 18px rgba(168, 52, 31, 0.22)); }
  .sticker.r1 { transform: rotate(-8deg); }
  .sticker.r2 { transform: rotate(12deg); }
  .sticker.r3 { transform: rotate(-4deg); }
</style>
</head>
<body>
  <img class="sticker r1" src="../assets/stickers/sticker-hostel-fav.svg" alt="">
  <img class="sticker r2" src="../assets/stickers/sticker-dum-special.svg" alt="">
  <img class="sticker r3" src="../assets/stickers/sticker-vitap-loved.svg" alt="">
</body>
</html>
