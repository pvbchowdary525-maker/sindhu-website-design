<!doctype html>
<html lang="en" class="sindhu">
<head>
<meta charset="utf-8">
<title>Type · Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { padding: 20px 24px; background: var(--cream); color: var(--espresso); }
  .row { display: flex; flex-direction: column; gap: 14px; }
  .specimen { display: flex; align-items: baseline; gap: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--espresso-12); }
  .specimen:last-child { border: none; }
  .meta { width: 130px; flex: none; font-family: var(--font-body); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-soft); line-height: 1.5; }
  .sample { font-family: var(--font-display); color: var(--espresso); line-height: 0.95; letter-spacing: -0.015em; }
</style>
</head>
<body>
  <div class="row">
    <div class="specimen">
      <div class="meta">Display XL · 900<br>Hero kill-shot</div>
      <div class="sample" style="font-size: 64px; font-weight: 900;">BIRYANI, BAGUNDI.</div>
    </div>
    <div class="specimen">
      <div class="meta">Display LG · 800<br>Section banner</div>
      <div class="sample" style="font-size: 44px; font-weight: 800;">Mana Biryani</div>
    </div>
    <div class="specimen">
      <div class="meta">Display MD · 700<br>Section header</div>
      <div class="sample" style="font-size: 32px; font-weight: 700;">Why Sindhu?</div>
    </div>
  </div>
</body>
</html>
