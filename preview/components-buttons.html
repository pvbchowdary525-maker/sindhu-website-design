<!doctype html>
<html lang="en" class="sindhu">
<head>
<meta charset="utf-8">
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { padding: 24px; background: var(--cream); color: var(--espresso); font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px 18px; align-items: center; }
  .lbl { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-soft); }
  .btn { font-family: var(--font-body); font-weight: 600; font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase; padding: 14px 24px; border-radius: 999px; border: none; cursor: pointer; transition: all 180ms cubic-bezier(.4,0,.2,1); display: inline-flex; align-items: center; gap: 8px; }
  .btn.solid { background: var(--saffron); color: var(--espresso); }
  .btn.solid:hover { background: var(--saffron-deep); }
  .btn.outline { background: transparent; color: var(--espresso); box-shadow: inset 0 0 0 1.5px var(--espresso); }
  .btn.outline:hover { background: var(--espresso); color: var(--cream); }
  .btn.pop { background: var(--magenta); color: var(--cream); }
  .btn.dark { background: var(--espresso); color: var(--cream); }
  .btn.sm { font-size: 12px; padding: 10px 16px; }
  .btn.lg { font-size: 16px; padding: 18px 30px; }
  .arrow { width: 14px; height: 14px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="lbl">Solid · primary</div>
    <button class="btn solid">Order Now <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg></button>
    <div class="lbl" style="text-align:right">at rest →</div>

    <div class="lbl">Outline · secondary</div>
    <button class="btn outline">View Menu</button>
    <div class="lbl" style="text-align:right">fills on hover</div>

    <div class="lbl">Pop · stickers/CTA</div>
    <button class="btn pop">Hostel Special</button>
    <div class="lbl" style="text-align:right">sparingly</div>

    <div class="lbl">Dark · footer</div>
    <button class="btn dark">WhatsApp Us</button>
    <div class="lbl" style="text-align:right">on saffron</div>

    <div class="lbl">Small / Large</div>
    <div style="display:flex; gap:10px; align-items:center;">
      <button class="btn solid sm">Add</button>
      <button class="btn solid lg">Order in 60s</button>
    </div>
    <div class="lbl" style="text-align:right">sizes</div>
  </div>
</body>
</html>
