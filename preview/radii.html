<!doctype html>
<html lang="en" class="sindhu">
<head>
<meta charset="utf-8">
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { padding: 20px 24px; background: var(--cream); color: var(--espresso); font-family: var(--font-body); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; align-items: end; }
  .tile { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .shape { width: 80px; height: 80px; background: var(--saffron); border: 1.5px solid var(--espresso); }
  .shape.blob { border-radius: var(--radius-blob); background: var(--brick); }
  .label { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-soft); text-align: center; line-height: 1.5; }
  .label b { color: var(--espresso); font-weight: 600; display: block; }
</style>
</head>
<body>
  <div class="row">
    <div class="tile"><div class="shape" style="border-radius: 8px;"></div><div class="label"><b>--radius-sm</b>8 px</div></div>
    <div class="tile"><div class="shape" style="border-radius: 20px;"></div><div class="label"><b>--radius-md</b>20 px</div></div>
    <div class="tile"><div class="shape" style="border-radius: 36px;"></div><div class="label"><b>--radius-lg</b>36 px</div></div>
    <div class="tile"><div class="shape" style="border-radius: 999px;"></div><div class="label"><b>--radius-pill</b>999 px</div></div>
    <div class="tile"><div class="shape blob"></div><div class="label"><b>--radius-blob</b>organic</div></div>
  </div>
</body>
</html>
