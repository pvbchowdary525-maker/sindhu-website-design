<!doctype html>
<html lang="en" class="sindhu">
<head>
<meta charset="utf-8">
<title>Line-art icons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { padding: 24px; background: var(--cream); color: var(--espresso); font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px 12px; }
  .tile { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .ic { width: 44px; height: 44px; color: var(--espresso); }
  .lbl { font-size: 11px; letter-spacing: 0.04em; color: var(--fg-soft); text-align: center; }
</style>
</head>
<body>
  <div class="grid">
    <div class="tile"><img class="ic" src="../assets/icons/pot.svg" alt=""><div class="lbl">pot</div></div>
    <div class="tile"><img class="ic" src="../assets/icons/banana-leaf.svg" alt=""><div class="lbl">banana leaf</div></div>
    <div class="tile"><img class="ic" src="../assets/icons/rice-grain.svg" alt=""><div class="lbl">rice grain</div></div>
    <div class="tile"><img class="ic" src="../assets/icons/chili.svg" alt=""><div class="lbl">chili</div></div>
    <div class="tile"><img class="ic" src="../assets/icons/spoon.svg" alt=""><div class="lbl">spoon</div></div>
    <div class="tile"><img class="ic" src="../assets/icons/flame.svg" alt=""><div class="lbl">flame</div></div>
    <div class="tile"><img class="ic" src="../assets/icons/wheat.svg" alt=""><div class="lbl">wheat</div></div>
    <div class="tile"><img class="ic" src="../assets/icons/scooter.svg" alt=""><div class="lbl">scooter</div></div>
    <div class="tile"><img class="ic" src="../assets/icons/rupee.svg" alt=""><div class="lbl">rupee</div></div>
    <div class="tile"><img class="ic" src="../assets/icons/pin.svg" alt=""><div class="lbl">pin</div></div>
    <div class="tile"><img class="ic" src="../assets/icons/whatsapp.svg" alt=""><div class="lbl">whatsapp</div></div>
    <div class="tile"><img class="ic" src="../assets/icons/instagram.svg" alt=""><div class="lbl">instagram</div></div>
  </div>
</body>
</html>
